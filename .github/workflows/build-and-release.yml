name: Build and Release Shittim Server

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Compile Python sources
        shell: pwsh
        run: |
          python -m py_compile .\shittim_console.py

      - name: Build Shittim Server executable
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name "Shittim Server" .\shittim_console.py

      - name: Publish server runtime
        shell: pwsh
        run: |
          dotnet publish .\Shittim-Server\Shittim-Server.csproj -c Release -r win-x64 --self-contained true -o .\server-runtime

      - name: Generate release tag
        id: version
        shell: pwsh
        run: |
          $stamp = Get-Date -Format 'yyyy.MM.dd'
          $tag = "v$stamp.${{ github.run_number }}"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset_name=Shittim-Server-$tag.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package release archive
        shell: pwsh
        run: |
          $packageDir = ".\release-package"
          $assetName = "${{ steps.version.outputs.asset_name }}"
          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $packageDir | Out-Null

          Copy-Item ".\dist\Shittim Server.exe" "$packageDir\Shittim Server.exe"
          Copy-Item ".\server-runtime" "$packageDir\server-runtime" -Recurse
          Copy-Item ".\README.md" "$packageDir\README.md"
          Copy-Item ".\Scripts" "$packageDir\Scripts" -Recurse

          Compress-Archive -Path "$packageDir\*" -DestinationPath ".\$assetName" -Force

      - name: Create Git tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: ${{ steps.version.outputs.asset_name }}
          generate_release_notes: true
