name: Build and Release Shittim Console

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Compile Python sources
        shell: pwsh
        run: |
          python -m py_compile .\shittim_console.py .\admin_gui.py

      - name: Build Shittim Console executable
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name "Shittim Console" .\shittim_console.py

      - name: Generate release tag
        id: version
        shell: pwsh
        run: |
          $stamp = Get-Date -Format 'yyyy.MM.dd'
          $tag = "v$stamp.${{ github.run_number }}"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset_name=Shittim-Console-$tag.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package release archive
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $assetName = "${{ steps.version.outputs.asset_name }}"
          Compress-Archive -Path ".\dist\Shittim Console.exe" -DestinationPath ".\$assetName" -Force

      - name: Create Git tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: ${{ steps.version.outputs.asset_name }}
          generate_release_notes: true
